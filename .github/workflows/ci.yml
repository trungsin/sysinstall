name: CI

on:
  push:
    branches: ["main", "dev"]
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    name: Lint (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dev deps
        run: pip install -e ".[dev]"
      - name: ruff check
        run: ruff check src/sysinstall
      - name: mypy
        run: mypy --strict src/sysinstall

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install deps
        run: pip install -e ".[dev]"
      - name: pytest with coverage
        run: |
          pytest --cov=src/sysinstall \
                  --cov-report=xml \
                  --cov-report=term \
                  --cov-report=term-missing \
                  -q
      - name: Enforce strict coverage threshold (>=80%)
        # Pure-logic modules: must stay ≥80% — no platform-conditional branches.
        run: |
          python -m coverage report \
            --include='src/sysinstall/safety/__init__.py,src/sysinstall/safety/errors.py,src/sysinstall/safety/guards.py,src/sysinstall/safety/prompts.py,src/sysinstall/safety/audit.py,src/sysinstall/disks/identifiers.py,src/sysinstall/disks/base.py,src/sysinstall/disks/macos.py,src/sysinstall/partition/planner.py,src/sysinstall/iso/catalog.py' \
            --fail-under=80
      - name: Enforce relaxed coverage threshold (>=60%)
        # Platform-conditional branches exercised by tests/smoke/ VM harness, not unit tests.
        run: |
          python -m coverage report \
            --include='src/sysinstall/boot/detector.py,src/sysinstall/boot/efi.py,src/sysinstall/safety/gates.py,src/sysinstall/disks/linux.py,src/sysinstall/disks/windows.py' \
            --fail-under=60
      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.os }}
          path: coverage.xml
